server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + SSE proxied to the gateway-backend. Buffering is disabled so the
    # Server-Sent-Events stream (flow 1) is delivered to the browser in real time.
    location /api/ {
        proxy_pass http://gateway-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
