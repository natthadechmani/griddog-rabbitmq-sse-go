apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: griddog
  labels: { app: emqx }
spec:
  selector: { matchLabels: { app: emqx } }
  template:
    metadata:
      labels: { app: emqx }
      annotations:
        # DATADOG — EMQX integration via the Prometheus/OpenMetrics endpoint + logs.
        # NOTE: the node agent image must include the datadog-emqx integrations-extras
        # check (the base agent does not bundle it) — same requirement as the custom
        # agent image built for docker-compose. mode=all_nodes_aggregated = cluster view.
        ad.datadoghq.com/emqx.checks: |
          {"emqx":{"init_config":{},"instances":[{"openmetrics_endpoint":"http://%%host%%:18083/api/v5/prometheus/stats?mode=all_nodes_aggregated"}]}}
        ad.datadoghq.com/emqx.logs: |
          [{"source":"emqx","service":"emqx"}]
    spec:
      containers:
        - name: emqx
          image: emqx/emqx-enterprise:6.2.2
          env:
            # Stable single-node name (loopback) so mnesia data isn't tied to the pod IP.
            - { name: EMQX_NODE_NAME, value: "emqx@127.0.0.1" }
          ports:
            - { containerPort: 1883 }    # MQTT (apps connect here)
            - { containerPort: 18083 }   # dashboard (default login admin/public)
          readinessProbe:
            exec:
              command: ["/opt/emqx/bin/emqx", "ctl", "status"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 25
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata: { name: emqx, namespace: griddog }
spec:
  selector: { app: emqx }
  ports: [{ port: 1883 }]        # only MQTT needed in-cluster
