apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: griddog
  labels: { app: emqx }
spec:
  selector: { matchLabels: { app: emqx } }
  template:
    metadata:
      labels: { app: emqx }
      # NOTE: no ad.datadoghq.com/* annotations yet — the EMQX<->Datadog integration
      # (Prometheus check + log collection) is a later phase, mirroring rabbitmq.yaml.
    spec:
      containers:
        - name: emqx
          image: emqx/emqx-enterprise:6.2.2
          env:
            # Stable single-node name (loopback) so mnesia data isn't tied to the pod IP.
            - { name: EMQX_NODE_NAME, value: "emqx@127.0.0.1" }
          ports:
            - { containerPort: 1883 }    # MQTT (apps connect here)
            - { containerPort: 18083 }   # dashboard (default login admin/public)
          readinessProbe:
            exec:
              command: ["/opt/emqx/bin/emqx", "ctl", "status"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 25
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata: { name: emqx, namespace: griddog }
spec:
  selector: { app: emqx }
  ports: [{ port: 1883 }]        # only MQTT needed in-cluster
