apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: griddog
  labels: { app: mysql }
spec:
  selector: { matchLabels: { app: mysql } }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
        - name: mysql
          image: mysql:8
          env:
            - { name: MYSQL_ROOT_PASSWORD, value: "rootpw" }
            - { name: MYSQL_DATABASE, value: "appdb" }
          ports: [{ containerPort: 3306 }]
---
apiVersion: v1
kind: Service
metadata: { name: mysql, namespace: griddog }
spec:
  selector: { app: mysql }
  ports: [{ port: 3306 }]
