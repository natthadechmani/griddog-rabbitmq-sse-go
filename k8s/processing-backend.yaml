apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-backend
  namespace: griddog
  labels:
    app: processing-backend
    # DATADOG Unified Service Tagging
    tags.datadoghq.com/env: "k8s-sandbox"
    tags.datadoghq.com/service: "processing-backend"
    tags.datadoghq.com/version: "dev"
spec:
  selector: { matchLabels: { app: processing-backend } }
  template:
    metadata:
      labels:
        app: processing-backend
        # DATADOG Unified Service Tagging
        # Inject DD_ENV/DD_SERVICE/DD_VERSION into the container:
        tags.datadoghq.com/env: "k8s-sandbox"
        tags.datadoghq.com/service: "processing-backend"
        tags.datadoghq.com/version: "dev"
        admission.datadoghq.com/enabled: "true"
        my.custom.label.team: "golang-backend-team"
      annotations:
        # Enable Log Collection AutoDiscovery + Parsing
        ad.datadoghq.com/app.logs: '[{"source":"go","service":"processing-backend"}]'
    spec:
      containers:
        - name: app                    # <-- matches ad.datadoghq.com/app.logs
          image: griddog/processing:dev
          imagePullPolicy: IfNotPresent
          ports: [{ name: http, containerPort: 8081 }]
          env:
            # --- app connectivity (in-cluster Service DNS) ---
            - { name: PORT, value: "8081" }
            - { name: MYSQL_DSN, value: "root:rootpw@tcp(mysql:3306)/appdb?parseTime=true&multiStatements=true" }
            - { name: RABBITMQ_URL, value: "amqp://guest:guest@rabbitmq:5672/" }
            - { name: MQTT_URL, value: "tcp://emqx:1883" }
            # DATADOG Feature Flags
            - { name: DD_LOGS_INJECTION, value: "true" }
            - { name: DD_RUNTIME_METRICS_ENABLED, value: "true" }
            - { name: DD_PROFILING_ENABLED, value: "true" }
            - { name: DD_DATA_STREAMS_ENABLED, value: "true" }   # DSM
---
apiVersion: v1
kind: Service
metadata: { name: processing-backend, namespace: griddog }   # name MUST match — PROCESSING_BASE_URL targets it
spec:
  selector: { app: processing-backend }
  ports: [{ port: 8081 }]
