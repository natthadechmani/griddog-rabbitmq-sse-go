# The Datadog integration here is entirely the two pod-template annotations
# below (ad.datadoghq.com/<container>.{checks,logs}) — everything else is
# vanilla Kubernetes. <container> must match the container `name:` in the
# pod spec, which is `rabbitmq` here. %%host%% resolves to the pod IP.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: griddog
  labels: { app: rabbitmq }
spec:
  selector: { matchLabels: { app: rabbitmq } }
  template:
    metadata:
      labels: { app: rabbitmq }
      annotations:
        # 👉 DATADOG — RabbitMQ integration (Prometheus plugin) + log collection:
        ad.datadoghq.com/rabbitmq.checks: |
          {"rabbitmq":{"init_config":{},"instances":[{"prometheus_plugin":{"url":"http://%%host%%:15692","unaggregated_endpoint":"detailed?family=queue_coarse_metrics&family=queue_consumer_count&family=channel_exchange_metrics&family=channel_queue_exchange_metrics&family=node_coarse_metrics"}}]}}
        ad.datadoghq.com/rabbitmq.logs: |
          [{"source":"rabbitmq","service":"rabbitmq","log_processing_rules":[{"type":"multi_line","name":"logs_starts_with_equal_sign","pattern":"="}]}]
    spec:
      containers:
        - name: rabbitmq            # <-- must match the <container> in the annotation keys above
          image: rabbitmq:3-management
          ports:
            - { containerPort: 5672 }    # amqp (apps connect here)
            - { containerPort: 15692 }   # Prometheus /metrics (scraped by the check above)
---
apiVersion: v1
kind: Service
metadata: { name: rabbitmq, namespace: griddog }
spec:
  selector: { app: rabbitmq }
  ports: [{ port: 5672 }]        # only amqp needed in-cluster; the check scrapes the pod directly
