apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: griddog
  labels: { app: frontend }
spec:
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels: { app: frontend }
      annotations:
        ad.datadoghq.com/web.logs: '[{"source":"nginx","service":"frontend"}]'   #  Nginx logs Autodiscovery/Parser
    spec:
      containers:
        - name: web                    # <-- matches ad.datadoghq.com/web.logs
          image: griddog/frontend:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: griddog }
spec:
  type: NodePort
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80, nodePort: 30088 }]
