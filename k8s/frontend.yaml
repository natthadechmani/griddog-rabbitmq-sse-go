# nginx works unchanged from the compose setup — its proxy_pass targets the
# gateway-backend Service by name. Only the logs annotation is Datadog-specific.
# NodePort so it's reachable via `minikube service` / port-forward (the node
# IP is not routable from the host on the macOS docker/containerd driver).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: griddog
  labels: { app: frontend }
spec:
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels: { app: frontend }
      annotations:
        ad.datadoghq.com/web.logs: '[{"source":"nginx","service":"frontend"}]'   # 👉 DATADOG nginx logs
    spec:
      containers:
        - name: web                    # <-- matches ad.datadoghq.com/web.logs
          image: griddog/frontend:dev
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: griddog }
spec:
  type: NodePort
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80, nodePort: 30088 }]
