apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: datadog
spec:
  global:
    clusterName: griddog-k8s-sandbox
    site: datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
    podLabelsAsTags:                 # compose DD_CONTAINER_LABELS_AS_TAGS analog
      my.custom.label.team: team
    tags:                            # Universal Service Tagging: stamp ALL telemetry from this cluster
      - "env:k8s-sandbox"            
    kubelet:
      # https://docs.datadoghq.com/containers/kubernetes/distributions/?tab=datadogoperator#without-tls-verification
      tlsVerify: false
  features:
    apm:
      enabled: true                  # UDS default (/var/run/datadog/apm.socket) — no hostPort needed
    logCollection:                   # Enable Log Collection
      enabled: true
      containerCollectAll: true      # Disable to Collect Logs from Container Labels instead of All https://docs.datadoghq.com/agent/basic_agent_usage/kubernetes/#log-collection-setup
    liveProcessCollection:        
      enabled: true
  override:
    nodeAgent:
      # hostname auto-detection (GCE/EC2/Azure/kubelet nodename) can fail
      # with "unable to reliably determine the host name" — pin it explicitly
      # to the K8s node name via the downward API.
      env:
        - name: DD_HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
