services:
  datadog-agent:
    image: registry.datadoghq.com/agent:latest
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_HOSTNAME=${DD_HOSTNAME:-griddog-sandbox}
      - DD_TAGS=${DD_TAGS:-}
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_PROCESS_AGENT_ENABLED=true
      - 'DD_CONTAINER_LABELS_AS_TAGS={"my.custom.label.team":"team"}'
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    pid: "host"
    ports:
      - "8126:8126/tcp"
      - "8125:8125/udp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692" # Prometheus plugin /metrics
    labels:
      # Datadog Autodiscovery: run the rabbitmq integration against this container
      # using the Prometheus plugin. %%host%% resolves to the container's IP; the
      # detailed families add per-queue / per-exchange / per-node metrics that
      # complement DSM. The agent picks these labels up via the docker socket.
      com.datadoghq.ad.checks: '{"rabbitmq": {"init_config": {}, "instances": [{"prometheus_plugin": {"url": "http://%%host%%:15692", "unaggregated_endpoint": "detailed?family=queue_coarse_metrics&family=queue_consumer_count&family=channel_exchange_metrics&family=channel_queue_exchange_metrics&family=node_coarse_metrics"}}]}}'
      com.datadoghq.ad.logs: '[{"source": "rabbitmq", "service": "rabbitmq", "log_processing_rules": [{"type": "multi_line", "name": "logs_starts_with_equal_sign", "pattern": "="}]}]'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20

  gateway-backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: gateway
    environment:
      PORT: "8080"
      MYSQL_DSN: "root:rootpw@tcp(mysql:3306)/appdb?parseTime=true&multiStatements=true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      PROCESSING_BASE_URL: "http://processing-backend:8081"
      # --- Datadog (orchestrion auto-instrumentation reports to the agent) ---
      DD_AGENT_HOST: datadog-agent
      DD_ENV: "${DD_ENV:-sandbox}"
      DD_SERVICE: gateway-backend
      DD_VERSION: "${DD_VERSION:-dev}"
      DD_LOGS_INJECTION: "true"
      DD_RUNTIME_METRICS_ENABLED: "true"
      DD_PROFILING_ENABLED: "true"
      DD_DATA_STREAMS_ENABLED: "true"
    labels:
      my.custom.label.team: "golang-backend-team"
      com.datadoghq.ad.logs: '[{"source": "go", "service": "gateway-backend"}]'
      com.datadoghq.tags.service: "gateway-backend"
      com.datadoghq.tags.env: "${DD_ENV:-sandbox}"
      com.datadoghq.tags.version: "${DD_VERSION:-dev}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      datadog-agent:
        condition: service_started

  processing-backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: processing
    environment:
      PORT: "8081"
      MYSQL_DSN: "root:rootpw@tcp(mysql:3306)/appdb?parseTime=true&multiStatements=true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      # --- Datadog (orchestrion auto-instrumentation reports to the agent) ---
      DD_AGENT_HOST: datadog-agent
      DD_ENV: "${DD_ENV:-sandbox}"
      DD_SERVICE: processing-backend
      DD_VERSION: "${DD_VERSION:-dev}"
      DD_LOGS_INJECTION: "true"
      DD_RUNTIME_METRICS_ENABLED: "true"
      DD_PROFILING_ENABLED: "true"
      DD_DATA_STREAMS_ENABLED: "true"
    labels:
      my.custom.label.team: "golang-backend-team"
      com.datadoghq.ad.logs: '[{"source": "go", "service": "processing-backend"}]'
      com.datadoghq.tags.service: "processing-backend"
      com.datadoghq.tags.env: "${DD_ENV:-sandbox}"
      com.datadoghq.tags.version: "${DD_VERSION:-dev}"
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      datadog-agent:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - gateway-backend

volumes:
  mysql-data:
