services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: appdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpw"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 20

  gateway-backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: gateway
    environment:
      PORT: "8080"
      MYSQL_DSN: "root:rootpw@tcp(mysql:3306)/appdb?parseTime=true&multiStatements=true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
      PROCESSING_BASE_URL: "http://processing-backend:8081"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  processing-backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: processing
    environment:
      PORT: "8081"
      MYSQL_DSN: "root:rootpw@tcp(mysql:3306)/appdb?parseTime=true&multiStatements=true"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "8088:80"
    depends_on:
      - gateway-backend

volumes:
  mysql-data:
